<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live Meeting</title>
    <script src="/external_api.js"></script>
    <style>
      html,
      body,
      #meet {
        height: 100%;
        margin: 0;
      }

      body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        max-width: min(520px, calc(100vw - 24px));
        padding: 10px 12px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.78);
        font-size: 14px;
        line-height: 1.35;
      }

      #meet iframe {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading meeting...</div>
    <div id="meet"></div>

    <script>
      const statusNode = document.getElementById('status');
      const params = new URLSearchParams(window.location.search);
      const roomName = (params.get('room') || 'live-session')
        .replace(/[^A-Za-z0-9-_]/g, '-')
        .slice(0, 80);

      let meetingLive = false;
      let meetingStarted = false;
      let startPending = false;
      let attempts = 0;

      function setStatus(message) {
        statusNode.textContent = message;
      }

      function startLiveMeeting(reason) {
        if (meetingLive || startPending || attempts >= 8) {
          return;
        }

        attempts += 1;
        meetingStarted = true;
        startPending = true;

        setStatus(`Connecting to live meeting (attempt ${attempts})...`);

        api.executeCommand('startRecording', {
          mode: 'file',
          shouldShare: true,
          extraMetadata: {
            source: 'live-meeting-page',
            roomName
          }
        });

        // Clear pending flag after 12s if no status event arrives
        window.setTimeout(() => { startPending = false; }, 12000);
      }

      const api = new JitsiMeetExternalAPI(window.location.host, {
        roomName,
        parentNode: document.getElementById('meet'),
        width: '100%',
        height: '100%',
        userInfo: {
          displayName: 'Pat Live'
        },
        configOverwrite: {
          prejoinConfig: {
            enabled: false
          },
          startWithAudioMuted: true,
          startWithVideoMuted: true
        },
        interfaceConfigOverwrite: {
          DISABLE_JOIN_LEAVE_NOTIFICATIONS: true
        }
      });

      api.addEventListener('videoConferenceJoined', () => {
        setStatus(`Joined ${roomName}. Starting live meeting...`);
        window.setTimeout(() => startLiveMeeting('joined'), 5000);
      });

      api.addEventListener('participantRoleChanged', event => {
        if (event.role === 'moderator') {
          setStatus('Connected. Starting live meeting...');
          window.setTimeout(() => startLiveMeeting('moderator'), 1500);
        }
      });

      api.addEventListener('recordingStatusChanged', event => {
        startPending = false;
        const isOn = event.on === true
          || event.status === 'on'
          || event.status === 'recording';

        if (isOn) {
          meetingLive = true;
          setStatus(`Live meeting is active for ${roomName}. Keep this page open until the session ends.`);
        } else if (meetingStarted) {
          setStatus(`Meeting status changed. Current status: ${event.status || 'unknown'}.`);
        }
      });

      window.setInterval(() => {
        if (!meetingLive && meetingStarted && attempts < 8) {
          startLiveMeeting('retry');
        }
      }, 15000);
    </script>
  </body>
</html>
